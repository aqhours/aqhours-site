name: Deploy homepage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: homepage-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589645e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck

      - name: Build static site
        run: pnpm run build

  deploy:
    name: Deploy production
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://aqhours.cn/

    steps:
      - name: Configure SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AQHOURS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.AQHOURS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/github-actions-homepage
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/github-actions-homepage
          install -m 600 /dev/null ~/.ssh/known_hosts
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Rebuild homepage on server
        shell: bash
        env:
          SSH_HOST: ${{ vars.AQHOURS_SSH_HOST }}
          SSH_USER: ${{ vars.AQHOURS_SSH_USER }}
        run: |
          set -euo pipefail
          ssh -T \
            -i ~/.ssh/github-actions-homepage \
            -o BatchMode=yes \
            -o ConnectTimeout=20 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST"

      - name: Verify public endpoint
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..10}; do
            if curl -fsSI https://aqhours.cn/; then
              exit 0
            fi
            sleep 3
          done
          exit 1
